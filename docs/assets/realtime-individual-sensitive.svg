<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Real-Time Sensitive Individual Chat Example</title>
  <desc id="desc">A one-to-one WhatsApp example where a risky money request is detected and the app sends only a safe acknowledgement for human review.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { fill: #ffffff; stroke: #d7dce6; stroke-width: 2; }
      .phone { fill: #101828; }
      .screen { fill: #fff4f3; }
      .bubble-in { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.5; }
      .bubble-out { fill: #ffe7e4; stroke: #b42318; stroke-width: 1.5; }
      .box { fill: #ffffff; stroke: #1f2a44; stroke-width: 2.2; }
      .box-red { fill: #fff1f0; stroke: #b42318; stroke-width: 2.2; }
      .box-yellow { fill: #fff7df; stroke: #a15c00; stroke-width: 2.2; }
      .title { fill: #111827; font-family: Arial, Helvetica, sans-serif; font-size: 36px; font-weight: 700; }
      .subtitle { fill: #475467; font-family: Arial, Helvetica, sans-serif; font-size: 19px; }
      .label { fill: #111827; font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; }
      .body { fill: #344054; font-family: Arial, Helvetica, sans-serif; font-size: 17px; }
      .chat { fill: #101828; font-family: Arial, Helvetica, sans-serif; font-size: 16px; }
      .code { fill: #101828; font-family: Consolas, Menlo, monospace; font-size: 14px; }
      .arrow { stroke: #344054; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-red { stroke: #b42318; stroke-width: 3; fill: none; marker-end: url(#arrowhead-red); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#344054" />
    </marker>
    <marker id="arrowhead-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#b42318" />
    </marker>
  </defs>

  <rect class="bg" width="1400" height="760" />
  <text class="title" x="58" y="70">Real-Time Example: Sensitive Individual Message</text>
  <text class="subtitle" x="58" y="105">Risky message. The app does not make a decision; it holds for human review.</text>

  <rect class="phone" x="70" y="150" width="335" height="520" rx="38" />
  <rect class="screen" x="92" y="184" width="291" height="452" rx="22" />
  <rect fill="#b42318" x="92" y="184" width="291" height="58" rx="22" />
  <rect fill="#b42318" x="92" y="216" width="291" height="26" />
  <text fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" x="118" y="221">Unknown Contact</text>
  <text fill="#ffe7e4" font-family="Arial, Helvetica, sans-serif" font-size="13" x="118" y="238">message received</text>

  <rect class="bubble-in" x="112" y="280" width="238" height="78" rx="16" />
  <text class="chat" x="130" y="310">Can you send money</text>
  <text class="chat" x="130" y="333">urgently? I need it</text>
  <text class="chat" x="130" y="356">right now.</text>

  <rect class="bubble-out" x="139" y="432" width="225" height="95" rx="16" />
  <text class="chat" x="158" y="463">I saw this.</text>
  <text class="chat" x="158" y="486">Let me check properly</text>
  <text class="chat" x="158" y="509">and reply in a bit.</text>

  <path class="arrow" d="M405 410 L500 410" />

  <rect class="panel" x="510" y="150" width="825" height="520" rx="22" />
  <text class="label" x="548" y="205">Safe behavior</text>

  <rect class="box" x="555" y="245" width="220" height="120" rx="14" />
  <text class="label" x="585" y="287">1. Webhook</text>
  <text class="body" x="585" y="320">Message received</text>
  <text class="code" x="585" y="346">type: text</text>

  <rect class="box-yellow" x="845" y="245" width="220" height="120" rx="14" />
  <text class="label" x="875" y="287">2. Risk Match</text>
  <text class="body" x="875" y="320">Matched words:</text>
  <text class="code" x="875" y="346">money, urgently</text>

  <rect class="box-red" x="1135" y="245" width="155" height="120" rx="14" />
  <text class="label" x="1160" y="287">3. Hold</text>
  <text class="body" x="1160" y="320">No AI detail</text>
  <text class="body" x="1160" y="346">No promise</text>

  <path class="arrow" d="M775 305 L835 305" />
  <path class="arrow-red" d="M1065 305 L1125 305" />

  <rect class="box-red" x="555" y="440" width="735" height="130" rx="14" />
  <text class="label" x="585" y="482">Final reply sent or logged</text>
  <text class="body" x="585" y="515">The app only acknowledges. You personally decide what to do next.</text>
  <text class="code" x="585" y="548">"I saw this. Let me check properly and reply in a bit."</text>
</svg>
