<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Real-Time Individual Chat Example</title>
  <desc id="desc">A one-to-one WhatsApp example where Sam sends a normal work message, the app checks it, OpenAI writes a short reply, and WhatsApp sends the reply back.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { fill: #ffffff; stroke: #d7dce6; stroke-width: 2; }
      .phone { fill: #101828; }
      .screen { fill: #eef7f1; }
      .bubble-in { fill: #ffffff; stroke: #d0d5dd; stroke-width: 1.5; }
      .bubble-out { fill: #dcf8c6; stroke: #98a87c; stroke-width: 1.5; }
      .box { fill: #ffffff; stroke: #1f2a44; stroke-width: 2.2; }
      .box-blue { fill: #edf5ff; stroke: #1f5fbf; stroke-width: 2.2; }
      .box-green { fill: #ecf8f0; stroke: #18794e; stroke-width: 2.2; }
      .title { fill: #111827; font-family: Arial, Helvetica, sans-serif; font-size: 36px; font-weight: 700; }
      .subtitle { fill: #475467; font-family: Arial, Helvetica, sans-serif; font-size: 19px; }
      .label { fill: #111827; font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; }
      .body { fill: #344054; font-family: Arial, Helvetica, sans-serif; font-size: 17px; }
      .small { fill: #667085; font-family: Arial, Helvetica, sans-serif; font-size: 15px; }
      .chat { fill: #101828; font-family: Arial, Helvetica, sans-serif; font-size: 16px; }
      .code { fill: #101828; font-family: Consolas, Menlo, monospace; font-size: 14px; }
      .arrow { stroke: #344054; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-green { stroke: #18794e; stroke-width: 3; fill: none; marker-end: url(#arrowhead-green); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#344054" />
    </marker>
    <marker id="arrowhead-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#18794e" />
    </marker>
  </defs>

  <rect class="bg" width="1400" height="760" />
  <text class="title" x="58" y="70">Real-Time Example: Individual Chat</text>
  <text class="subtitle" x="58" y="105">Normal one-to-one message. The app can reply automatically when DRY_RUN=false.</text>

  <rect class="phone" x="70" y="150" width="335" height="520" rx="38" />
  <rect class="screen" x="92" y="184" width="291" height="452" rx="22" />
  <rect fill="#075e54" x="92" y="184" width="291" height="58" rx="22" />
  <rect fill="#075e54" x="92" y="216" width="291" height="26" />
  <text fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" x="118" y="221">Sam</text>
  <text fill="#d7fff1" font-family="Arial, Helvetica, sans-serif" font-size="13" x="118" y="238">online</text>

  <rect class="bubble-in" x="112" y="280" width="238" height="78" rx="16" />
  <text class="chat" x="130" y="310">Hey Akash, can we</text>
  <text class="chat" x="130" y="333">discuss the API bug</text>
  <text class="chat" x="130" y="356">today?</text>

  <rect class="bubble-out" x="139" y="432" width="225" height="95" rx="16" />
  <text class="chat" x="158" y="463">Yes, let’s do it.</text>
  <text class="chat" x="158" y="486">I’m tied up for a bit,</text>
  <text class="chat" x="158" y="509">but I’ll message shortly.</text>

  <path class="arrow" d="M405 410 L500 410" />

  <rect class="panel" x="510" y="150" width="825" height="520" rx="22" />
  <text class="label" x="548" y="205">What happens behind the scenes</text>

  <rect class="box-blue" x="555" y="245" width="205" height="110" rx="14" />
  <text class="label" x="582" y="285">1. Webhook</text>
  <text class="body" x="582" y="315">Meta sends event</text>
  <text class="code" x="582" y="338">POST /webhook</text>

  <rect class="box" x="830" y="245" width="205" height="110" rx="14" />
  <text class="label" x="857" y="285">2. Policy</text>
  <text class="body" x="857" y="315">Not duplicate</text>
  <text class="body" x="857" y="338">Not sensitive</text>

  <rect class="box-blue" x="1105" y="245" width="180" height="110" rx="14" />
  <text class="label" x="1130" y="285">3. OpenAI</text>
  <text class="body" x="1130" y="315">Short reply</text>
  <text class="body" x="1130" y="338">Your tone</text>

  <path class="arrow" d="M760 300 L820 300" />
  <path class="arrow" d="M1035 300 L1095 300" />

  <rect class="box-green" x="555" y="430" width="350" height="140" rx="14" />
  <text class="label" x="585" y="472">4. WhatsApp Reply</text>
  <text class="body" x="585" y="505">If DRY_RUN=false, reply is sent.</text>
  <text class="body" x="585" y="535">If DRY_RUN=true, reply is logged only.</text>

  <rect class="box" x="965" y="430" width="320" height="140" rx="14" />
  <text class="label" x="995" y="472">Example Log</text>
  <text class="code" x="995" y="505">event: dry_run_reply</text>
  <text class="code" x="995" y="532">to: 15551234567</text>
  <text class="code" x="995" y="559">reply: "Yes, let’s do it..."</text>

  <path class="arrow-green" d="M1195 355 C1195 395 735 395 735 420" />
</svg>
